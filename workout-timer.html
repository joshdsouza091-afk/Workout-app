<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <title>Workout Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d0d0d; color: #fff; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    #app { max-width: 420px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* Screens */
    .screen { display: flex; flex-direction: column; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
    .screen.hidden { display: none; }

    /* Splash */
    #splash { justify-content: space-between; padding: 48px 24px 40px; background: #0d0d0d; }
    .splash-eyebrow { font-size: 11px; letter-spacing: 4px; color: #FF5E3A; margin-bottom: 10px; }
    .splash-title { font-size: 38px; font-weight: 900; line-height: 1.1; margin-bottom: 24px; }
    .splash-title span { color: #FF5E3A; }
    .exercise-list-splash { font-size: 13px; color: #555; line-height: 2.2; }
    .exercise-list-splash div { display: flex; align-items: center; gap: 10px; }
    .stats-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .stat-card { flex: 1; background: #151515; border-radius: 12px; padding: 14px 8px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 900; color: #FF5E3A; }
    .stat-label { font-size: 11px; color: #555; letter-spacing: 1px; }

    /* Buttons */
    .btn-primary { width: 100%; padding: 18px; border: none; border-radius: 14px; color: #fff; font-size: 18px; font-weight: 900; letter-spacing: 2px; cursor: pointer; }
    .btn-ghost { background: none; border: 1px solid #2a2a2a; color: #666; border-radius: 10px; padding: 7px 12px; cursor: pointer; font-size: 13px; }
    .btn-skip { width: 100%; padding: 18px; border-radius: 16px; font-size: 15px; font-weight: 700; letter-spacing: 2px; cursor: pointer; }

    /* Workout header */
    .workout-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 0; }
    .ex-counter { font-size: 12px; color: #555; letter-spacing: 1px; }

    /* Progress bar */
    .progress-wrap { margin: 10px 20px 0; height: 3px; background: #1a1a1a; border-radius: 2px; }
    .progress-fill { height: 100%; background: #FF5E3A; border-radius: 2px; transition: width 0.5s; }

    /* Stopwatch */
    .stopwatch { display: flex; align-items: center; justify-content: center; gap: 8px;
      margin: 10px 20px 0; padding: 10px 16px; border-radius: 12px; cursor: pointer; user-select: none; }
    .sw-time { font-size: 22px; font-weight: 900; font-family: monospace; letter-spacing: 1px; }
    .sw-label { font-size: 11px; color: #444; letter-spacing: 1px; margin-left: 4px; }

    /* Timer body */
    .timer-body { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 20px 20px; }
    .phase-label { font-size: 11px; letter-spacing: 3px; margin-bottom: 5px; }
    .ex-name { font-size: 26px; font-weight: 900; color: #fff; line-height: 1.1; text-align: center; }
    .phase-header { text-align: center; margin-top: 20px; margin-bottom: 4px; }

    /* Set dots */
    .set-dots { display: flex; gap: 8px; justify-content: center; margin: 10px 0; }
    .dot { height: 8px; border-radius: 4px; transition: all 0.3s; }

    /* Circle */
    .circle-wrap { position: relative; width: 240px; height: 240px; display: flex; align-items: center; justify-content: center; margin: 6px 0; }
    .circle-wrap svg { position: absolute; transform: rotate(-90deg); }
    .circle-center { text-align: center; z-index: 1; }
    .big-num { font-size: 72px; font-weight: 900; font-family: monospace; color: #fff; line-height: 1; }
    .sub-label { font-size: 13px; color: #555; margin-top: 4px; }

    /* Set label */
    .set-label { font-size: 13px; color: #444; margin-bottom: 20px; }

    /* Next hint */
    .next-hint { margin-top: 12px; font-size: 12px; color: #444; text-align: center; }

    /* List view */
    .list-view { padding: 20px; overflow-y: auto; flex: 1; }
    .ex-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 10px; transition: all 0.3s; }
    .ex-item.active { background: #1e1e1e; border: 1px solid #333; }
    .ex-item.done { opacity: 0.35; }
    .ex-item-name { font-size: 13px; flex: 1; }
    .ex-now { font-size: 11px; color: #FF5E3A; letter-spacing: 1px; }

    /* Done screen */
    #done-screen { background: #0a0f0a; justify-content: center; align-items: center; text-align: center; padding: 60px 24px; }
    .trophy { font-size: 64px; margin-bottom: 16px; }
    .done-title { font-size: 32px; font-weight: 900; color: #00C97F; letter-spacing: -1px; margin-bottom: 8px; }
    .done-time { font-size: 38px; font-weight: 900; font-family: monospace; color: #fff; margin-bottom: 6px; }
    .done-sub { font-size: 14px; color: #555; margin-bottom: 48px; line-height: 1.8; }

    circle { transition: stroke-dashoffset 0.9s linear, stroke 0.4s; }
  </style>
</head>
<body>
<div id="app">

  <!-- SPLASH -->
  <div id="splash" class="screen">
    <div>
      <div class="splash-eyebrow">FULL BODY CIRCUIT</div>
      <div class="splash-title">10 Exercises<br><span>3 Sets · 25s</span></div>
      <div class="exercise-list-splash" id="splash-list"></div>
    </div>
    <div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-val">3</div><div class="stat-label">SETS</div></div>
        <div class="stat-card"><div class="stat-val">25s</div><div class="stat-label">PER SET</div></div>
        <div class="stat-card"><div class="stat-val">20s</div><div class="stat-label">REST</div></div>
      </div>
      <button class="btn-primary" style="background:#FF5E3A" onclick="startWorkout()">START WORKOUT</button>
    </div>
  </div>

  <!-- WORKOUT -->
  <div id="workout-screen" class="screen hidden" style="background:#0d0d0d">
    <div class="workout-header">
      <button class="btn-ghost" onclick="exitWorkout()">← Exit</button>
      <div class="ex-counter" id="ex-counter">1 / 10</div>
      <button class="btn-ghost" id="view-btn" onclick="toggleView()">☰ List</button>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="stopwatch" id="stopwatch" onclick="toggleStopwatch()">
      <span id="sw-icon">▶</span>
      <span class="sw-time" id="sw-time">00:00</span>
      <span class="sw-label" id="sw-label">TAP TO START</span>
    </div>

    <!-- Timer view -->
    <div id="timer-view" class="timer-body">
      <div class="phase-header">
        <div class="phase-label" id="phase-label">WORK</div>
        <div class="ex-name" id="ex-name">Goblet Squats</div>
      </div>
      <div class="set-dots" id="set-dots"></div>
      <div class="circle-wrap">
        <svg width="240" height="240">
          <circle cx="120" cy="120" r="100" fill="none" stroke="#1a1a1a" stroke-width="10"/>
          <circle id="ring" cx="120" cy="120" r="100" fill="none" stroke="#FF5E3A" stroke-width="10"
            stroke-dasharray="628.3" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <div class="circle-center">
          <div class="big-num" id="big-num">25</div>
          <div class="sub-label" id="sub-label">seconds left</div>
        </div>
      </div>
      <div class="set-label" id="set-label">Set 1 of 3</div>
      <button class="btn-skip" id="skip-btn" onclick="skipPhase()">Skip Set →</button>
      <div class="next-hint" id="next-hint"></div>
    </div>

    <!-- List view -->
    <div id="list-view" class="list-view hidden">
      <div id="exercise-list"></div>
    </div>
  </div>

  <!-- DONE -->
  <div id="done-screen" class="screen hidden">
    <div class="trophy">🏆</div>
    <div class="done-title">Workout Complete!</div>
    <div class="done-time" id="done-time"></div>
    <div class="done-sub">10 exercises · 3 sets · 25s each</div>
    <button class="btn-primary" style="background:#00C97F; max-width:300px" onclick="resetApp()">Start Again</button>
  </div>

</div>

<script>
const EXERCISES = [
  { name: "Goblet Squats",     emoji: "🏋️" },
  { name: "Military Press",    emoji: "💪" },
  { name: "Chest Raises",      emoji: "🎯" },
  { name: "Push Ups",          emoji: "⬇️" },
  { name: "Bicep Curls",       emoji: "💪" },
  { name: "Forearm Curls",     emoji: "🤜" },
  { name: "Tricep Extensions", emoji: "🔼" },
  { name: "Delt Fly",          emoji: "🦅" },
  { name: "Knee Raises",       emoji: "🦵" },
  { name: "Cross Knee Raises", emoji: "✖️" },
];
const TOTAL_SETS   = 3;
const SET_SECONDS  = 25;
const REST_SECONDS = 20;
const CIRC         = 2 * Math.PI * 100;

let exIdx = 0, set = 1, phase = "active", timeLeft = SET_SECONDS;
let mainInterval = null, swInterval = null;
let elapsed = 0, swRunning = false, finalTime = null;
let currentView = "timer";
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, vol = 0.3) {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playSound(type) {
  if (type === "tick")  beep(880, 0.08, 0.15);
  if (type === "rest")  { beep(660, 0.1); setTimeout(() => beep(440, 0.15), 130); }
  if (type === "go")    { beep(440, 0.1); setTimeout(() => beep(660, 0.2), 130); }
  if (type === "done")  [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f, 0.2), i*150));
}

function pad(n) { return String(n).padStart(2, "0"); }
function fmtTime(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return h > 0 ? `${pad(h)}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
}

// Build splash list
(function() {
  const el = document.getElementById("splash-list");
  EXERCISES.forEach(e => {
    const d = document.createElement("div");
    d.innerHTML = `<span>${e.emoji}</span><span>${e.name}</span>`;
    el.appendChild(d);
  });
})();

// Build exercise list (workout view)
function buildExList() {
  const el = document.getElementById("exercise-list");
  el.innerHTML = "";
  EXERCISES.forEach((e, i) => {
    const d = document.createElement("div");
    d.className = "ex-item" + (i === exIdx ? " active" : "") + (i < exIdx ? " done" : "");
    d.style.border = i === exIdx ? "1px solid #333" : "1px solid transparent";
    d.innerHTML = `
      <span style="font-size:16px">${i < exIdx ? "✅" : e.emoji}</span>
      <span class="ex-item-name" style="color:${i===exIdx?"#fff":"#666"};font-weight:${i===exIdx?700:400};text-decoration:${i<exIdx?"line-through":"none"}">${e.name}</span>
      ${i === exIdx ? '<span class="ex-now">NOW</span>' : ""}
    `;
    el.appendChild(d);
  });
}

function updateUI() {
  const isRest = phase === "rest";
  const color  = isRest ? "#4DA6FF" : "#FF5E3A";

  // progress bar
  const total     = EXERCISES.length * TOTAL_SETS;
  const completed = exIdx * TOTAL_SETS + (set - 1);
  document.getElementById("progress-fill").style.width = (completed / total * 100) + "%";

  // header
  document.getElementById("ex-counter").textContent = `${exIdx+1} / ${EXERCISES.length}`;

  // phase + name
  document.getElementById("phase-label").textContent  = isRest ? "REST" : "WORK";
  document.getElementById("phase-label").style.color  = color;
  document.getElementById("ex-name").textContent      = EXERCISES[exIdx].name;

  // ring
  const dur      = isRest ? REST_SECONDS : SET_SECONDS;
  const progress = 1 - timeLeft / dur;
  document.getElementById("ring").style.strokeDashoffset = CIRC * progress;
  document.getElementById("ring").style.stroke = color;

  // big number
  document.getElementById("big-num").textContent = pad(timeLeft);
  document.getElementById("sub-label").textContent = isRest ? "seconds rest" : "seconds left";

  // set label
  document.getElementById("set-label").textContent = `Set ${set} of ${TOTAL_SETS}`;

  // set dots
  const dotsEl = document.getElementById("set-dots");
  dotsEl.innerHTML = "";
  for (let i = 0; i < TOTAL_SETS; i++) {
    const d = document.createElement("div");
    const isDone   = i < set - 1;
    const isActive = i === set - 1;
    d.className = "dot";
    d.style.width      = isActive ? "28px" : "20px";
    d.style.background = isDone ? "#00C97F" : isActive ? color : "#2a2a2a";
    dotsEl.appendChild(d);
  }

  // skip button
  const skipBtn = document.getElementById("skip-btn");
  skipBtn.textContent = isRest ? "Skip Rest →" : "Skip Set →";
  skipBtn.style.background  = isRest ? "#1a2a3a" : "#1a1a1a";
  skipBtn.style.border      = `1px solid ${isRest ? "#4DA6FF" : "#333"}`;
  skipBtn.style.color       = isRest ? "#4DA6FF" : "#666";

  // next hint
  let hint = "";
  if (!isRest) {
    if (set < TOTAL_SETS)                        hint = `After this → ${REST_SECONDS}s rest`;
    else if (exIdx < EXERCISES.length - 1)       hint = `Next → ${EXERCISES[exIdx+1].name}`;
    else                                         hint = "Last set — finish strong!";
  } else {
    if (set < TOTAL_SETS)                        hint = `Next → Set ${set+1}`;
    else if (exIdx < EXERCISES.length - 1)       hint = `Next exercise → ${EXERCISES[exIdx+1].name}`;
    else                                         hint = "Last rest — almost done!";
  }
  document.getElementById("next-hint").textContent = hint;

  // list view
  buildExList();

  // stopwatch
  document.getElementById("sw-time").textContent  = fmtTime(elapsed);
  document.getElementById("sw-time").style.color  = swRunning ? "#fff" : "#444";
  document.getElementById("sw-icon").textContent  = swRunning ? "⏱" : "▶";
  document.getElementById("sw-label").textContent = swRunning ? "TAP TO STOP" : elapsed > 0 ? "TAP TO RESUME" : "TAP TO START";
  document.getElementById("stopwatch").style.background = swRunning ? "#151515" : "#111";
  document.getElementById("stopwatch").style.border = `1px solid ${swRunning ? "#2a2a2a" : "#1e1e1e"}`;
}

function advancePhase() {
  if (phase === "active") {
    if (set < TOTAL_SETS) {
      set++;
      phase = "rest";
      timeLeft = REST_SECONDS;
      playSound("rest");
    } else if (exIdx < EXERCISES.length - 1) {
      exIdx++;
      set = 1;
      phase = "rest";
      timeLeft = REST_SECONDS;
      playSound("rest");
    } else {
      finishWorkout();
      return;
    }
  } else {
    phase = "active";
    timeLeft = SET_SECONDS;
    playSound("go");
  }
  updateUI();
}

function finishWorkout() {
  clearInterval(mainInterval);
  clearInterval(swInterval);
  swRunning = false;
  finalTime = elapsed;

  document.getElementById("workout-screen").classList.add("hidden");
  document.getElementById("done-screen").classList.remove("hidden");
  document.getElementById("done-time").textContent = fmtTime(finalTime);
  playSound("done");
}

function startMainTimer() {
  clearInterval(mainInterval);
  mainInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 3 && timeLeft > 0) playSound("tick");
    if (timeLeft <= 0) {
      advancePhase();
    } else {
      updateUI();
    }
  }, 1000);
}

function skipPhase() {
  clearInterval(mainInterval);
  if (phase === "active") {
    if (set < TOTAL_SETS) { set++; phase = "rest"; timeLeft = REST_SECONDS; playSound("rest"); }
    else if (exIdx < EXERCISES.length - 1) { exIdx++; set = 1; phase = "rest"; timeLeft = REST_SECONDS; playSound("rest"); }
    else { finishWorkout(); return; }
  } else {
    phase = "active"; timeLeft = SET_SECONDS; playSound("go");
  }
  updateUI();
  startMainTimer();
}

function toggleStopwatch() {
  swRunning = !swRunning;
  if (swRunning) {
    swInterval = setInterval(() => {
      elapsed++;
      document.getElementById("sw-time").textContent = fmtTime(elapsed);
    }, 1000);
  } else {
    clearInterval(swInterval);
  }
  document.getElementById("sw-time").style.color  = swRunning ? "#fff" : "#444";
  document.getElementById("sw-icon").textContent  = swRunning ? "⏱" : "▶";
  document.getElementById("sw-label").textContent = swRunning ? "TAP TO STOP" : "TAP TO RESUME";
  document.getElementById("stopwatch").style.background = swRunning ? "#151515" : "#111";
  document.getElementById("stopwatch").style.border = `1px solid ${swRunning ? "#2a2a2a" : "#1e1e1e"}`;
}

function toggleView() {
  currentView = currentView === "timer" ? "list" : "timer";
  document.getElementById("timer-view").classList.toggle("hidden", currentView !== "timer");
  document.getElementById("list-view").classList.toggle("hidden", currentView !== "list");
  document.getElementById("view-btn").textContent = currentView === "timer" ? "☰ List" : "⏱ Timer";
}

function startWorkout() {
  exIdx = 0; set = 1; phase = "active"; timeLeft = SET_SECONDS;
  elapsed = 0; swRunning = false; finalTime = null; currentView = "timer";
  clearInterval(mainInterval); clearInterval(swInterval);

  document.getElementById("splash").classList.add("hidden");
  document.getElementById("done-screen").classList.add("hidden");
  document.getElementById("workout-screen").classList.remove("hidden");
  document.getElementById("timer-view").classList.remove("hidden");
  document.getElementById("list-view").classList.add("hidden");
  document.getElementById("view-btn").textContent = "☰ List";

  updateUI();
  startMainTimer();
}

function exitWorkout() {
  if (confirm("Exit workout?")) resetApp();
}

function resetApp() {
  clearInterval(mainInterval);
  clearInterval(swInterval);
  exIdx = 0; set = 1; phase = "active"; timeLeft = SET_SECONDS;
  elapsed = 0; swRunning = false;

  document.getElementById("done-screen").classList.add("hidden");
  document.getElementById("workout-screen").classList.add("hidden");
  document.getElementById("splash").classList.remove("hidden");
}
</script>
</body>
</html>
